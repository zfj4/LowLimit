{% extends "base.html" %}
{% block title %}LowLimit — Sign In{% endblock %}

{% block body %}
<div class="min-h-screen flex items-center justify-center bg-lp-blue px-4">
  <div class="w-full max-w-md">

    <!-- Header -->
    <div class="text-center mb-8">
      <h1 class="text-4xl font-bold text-tardis tracking-tight">LowLimit</h1>
      <p class="text-bleu mt-1 text-sm">Low Limit Sports Betting</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-lg border border-s-blue overflow-hidden">

      <!-- Tabs -->
      <div class="flex border-b border-s-blue">
        <button id="tab-login"
          onclick="switchTab('login')"
          class="flex-1 py-3 text-sm font-semibold text-white bg-tardis transition-colors">
          Sign In
        </button>
        <button id="tab-register"
          onclick="switchTab('register')"
          class="flex-1 py-3 text-sm font-semibold text-tardis bg-nw-blue hover:bg-pale-blue transition-colors">
          Create Account
        </button>
      </div>

      <div class="p-8">

        {% if error %}
        <div class="mb-4 px-4 py-3 rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm">
          {{ error }}
        </div>
        {% endif %}

        <!-- Login Form -->
        <form id="form-login" method="post" action="{% url 'login' %}">
          {% csrf_token %}
          <input type="hidden" name="action" value="login" />
          <div class="mb-4">
            <label class="block text-xs font-semibold text-bleu uppercase tracking-wide mb-1">Username</label>
            <input type="text" name="username" required autocomplete="username"
              class="w-full px-4 py-2 rounded-lg border border-s-blue focus:outline-none focus:ring-2 focus:ring-bleu bg-nw-blue text-tardis text-sm" />
          </div>
          <div class="mb-6">
            <label class="block text-xs font-semibold text-bleu uppercase tracking-wide mb-1">Password</label>
            <input type="password" name="password" required autocomplete="current-password"
              class="w-full px-4 py-2 rounded-lg border border-s-blue focus:outline-none focus:ring-2 focus:ring-bleu bg-nw-blue text-tardis text-sm" />
          </div>
          <button type="submit"
            class="w-full py-2.5 rounded-lg bg-p-orange hover:bg-p-orange-h text-white font-semibold text-sm transition-colors">
            Sign In
          </button>
        </form>

        <!-- Register Form -->
        <form id="form-register" method="post" action="{% url 'login' %}" class="hidden">
          {% csrf_token %}
          <input type="hidden" name="action" value="register" />
          <div class="grid grid-cols-2 gap-3 mb-4">
            <div>
              <label class="block text-xs font-semibold text-bleu uppercase tracking-wide mb-1">First Name</label>
              <input type="text" name="first_name" autocomplete="given-name"
                class="w-full px-4 py-2 rounded-lg border border-s-blue focus:outline-none focus:ring-2 focus:ring-bleu bg-nw-blue text-tardis text-sm" />
            </div>
            <div>
              <label class="block text-xs font-semibold text-bleu uppercase tracking-wide mb-1">Last Name</label>
              <input type="text" name="last_name" autocomplete="family-name"
                class="w-full px-4 py-2 rounded-lg border border-s-blue focus:outline-none focus:ring-2 focus:ring-bleu bg-nw-blue text-tardis text-sm" />
            </div>
          </div>
          <div class="mb-4">
            <label class="block text-xs font-semibold text-bleu uppercase tracking-wide mb-1">Choose a Username</label>
            <input type="text" name="username" required autocomplete="username"
              class="w-full px-4 py-2 rounded-lg border border-s-blue focus:outline-none focus:ring-2 focus:ring-bleu bg-nw-blue text-tardis text-sm" />
          </div>
          <div class="mb-6">
            <label class="block text-xs font-semibold text-bleu uppercase tracking-wide mb-1">Password (min 8 chars)</label>
            <input type="password" name="password" required autocomplete="new-password"
              class="w-full px-4 py-2 rounded-lg border border-s-blue focus:outline-none focus:ring-2 focus:ring-bleu bg-nw-blue text-tardis text-sm" />
          </div>
          <button type="submit"
            class="w-full py-2.5 rounded-lg bg-p-orange hover:bg-p-orange-h text-white font-semibold text-sm transition-colors">
            Create Account
          </button>
        </form>

      </div>
    </div><!-- /card -->

    <p class="text-center text-xs text-bleu mt-6 opacity-70">Virtual dollars only · No real money involved</p>
  </div>
</div>

<script>
  function switchTab(tab) {
    const isLogin = tab === 'login';
    document.getElementById('form-login').classList.toggle('hidden', !isLogin);
    document.getElementById('form-register').classList.toggle('hidden', isLogin);
    document.getElementById('tab-login').className =
      'flex-1 py-3 text-sm font-semibold transition-colors ' +
      (isLogin ? 'text-white bg-tardis' : 'text-tardis bg-nw-blue hover:bg-pale-blue');
    document.getElementById('tab-register').className =
      'flex-1 py-3 text-sm font-semibold transition-colors ' +
      (!isLogin ? 'text-white bg-tardis' : 'text-tardis bg-nw-blue hover:bg-pale-blue');
  }

  // If error came from a register attempt, stay on register tab
  {% if error and request.POST.action == 'register' %}
  switchTab('register');
  {% endif %}
</script>
{% endblock %}
