<!DOCTYPE html>
<html lang="en">
<head>

      theme: {
        extend: {

            'pale-blue': '#BDD8F2',
            'vl-blue':   '#D6E8F5',
            'nw-blue':   '#EBF4FC',
          }
        }
      }
    }
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body class="bg-lp-blue min-h-screen font-sans">
  {% block body %}{% endblock %}
